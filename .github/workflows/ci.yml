name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine version
        uses: gittools/actions/gitversion/execute@v3

      - name: Build module
        shell: pwsh
        run: |
          Install-Module -Name InvokeBuild -Force -Scope CurrentUser
          Install-Module -Name ModuleBuilder -Force -Scope CurrentUser
          Invoke-Build Build

      - name: Run tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests'
          $config.Run.Exit = $true
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'testResults.xml'
          $config.TestResult.OutputFormat = 'JUnitXml'
          Invoke-Pester -Configuration $config

      - name: Publish test results (Linux)
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && runner.os == 'Linux'
        with:
          files: testResults.xml

      - name: Publish test results (Windows)
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: always() && runner.os == 'Windows'
        with:
          files: testResults.xml

      - name: Import module
        shell: pwsh
        run: |
          $manifest = Get-ChildItem -Path output -Filter '*.psd1' -Recurse | Select-Object -First 1
          Import-Module $manifest.FullName -Force
          Get-Command -Module PoshKelvin | Format-Table -AutoSize
