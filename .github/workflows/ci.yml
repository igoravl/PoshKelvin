name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install prerequisites
        shell: pwsh
        run: |
          Install-Module -Name InvokeBuild   -Force -Scope CurrentUser
          Install-Module -Name ModuleBuilder -Force -Scope CurrentUser
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser

      - name: Build, test and verify
        shell: pwsh
        run: ./build.ps1 -Task Package

      - name: Publish test results (Linux)
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && runner.os == 'Linux'
        with:
          files: testResults.xml

      - name: Publish test results (Windows)
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: always() && runner.os == 'Windows'
        with:
          files: testResults.xml
